name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create GitHub Release
  id-token: write # npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    # Only the repo owner may release. Defense-in-depth alongside tag
    # protection (blocks the tag) and the `release` environment (requires
    # a manual approval before this job runs).
    if: github.actor == 'DaylightChen'
    environment: release
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build
      - run: pnpm -r test

      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(node -p "require('./packages/core/package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "Tag v$TAG does not match package version $PKG"; exit 1
          fi

      - name: Publish tiny-agentic
        run: pnpm --filter tiny-agentic publish --no-git-checks --provenance --access public

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
